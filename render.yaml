services:
  - type: web
    name: talenthub
    runtime: node
    plan: free
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: JWT_SECRET
        generateValue: true
      # PostgreSQL (Neon — use the POOLED connection string, hostname contains "-pooler")
      - key: DATABASE_URL
        sync: false
      # Set to "false" once the site has real users, to stop the demo dataset (fake
      # specialists/vacancies/orders) from being seeded on a fresh database. Leave unset
      # (defaults to on) for a new deploy you want to explore populated.
      - key: SEED_DEMO_DATA
        sync: false
      # Google OAuth (create free credentials at https://console.cloud.google.com)
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # Set both of these to your actual Render URL after the first deploy,
      # e.g. https://talenthub.onrender.com
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: TELEGRAM_API_ID
        sync: false
      - key: TELEGRAM_API_HASH
        sync: false
      - key: TELEGRAM_CHANNEL
        value: UstozShogird
